site_name: pyaegean
site_description: A specialist Python toolkit for Ancient Greek and the Aegean syllabic scripts
site_url: https://pyaegean.xyz/
repo_url: https://github.com/ryanpavlicek/pyaegean
repo_name: ryanpavlicek/pyaegean
copyright: Apache-2.0
docs_dir: docs

# Local-only working docs that are not part of the published site (and not in the repo).
exclude_docs: |
  *ROADMAP*.md
  *PLAN*.md
  inquiries/
  demo/__pycache__/


theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_root_heading: true
            show_root_full_path: false
            show_source: false
            members_order: source
            docstring_section_style: list
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: true
            show_submodules: false
            filters: ["!^_"]

markdown_extensions:
  - attr_list
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

nav:
  - Home: index.md
  - Try it in your browser: https://pyaegean.xyz/demo/
  - API reference:
      - Overview: api/index.md
      - aegean: api/aegean.md
      - aegean.core: api/core.md
      - aegean.greek: api/greek.md
      - aegean.analysis: api/analysis.md
      - aegean.io: api/io.md
      - aegean.geo: api/geo.md
      - aegean.ai: api/ai.md
      - aegean.translate: api/translate.md
      - aegean.data: api/data.md
      - aegean.viz: api/viz.md
      - aegean.cache: api/cache.md
      - aegean.db: api/db.md
      - aegean.mcp_server: api/mcp.md
  - Benchmarks: benchmarks.md
  - Design notes:
      - Large corpora: large-corpora.md
      - Methodology: methodology.md
      - Pleiades candidates: pleiades-candidates.md
