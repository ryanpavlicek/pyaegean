name: "Data contribution (a lexicon entry, sign value, gazetteer ID, …)"
description: "Contribute a small, sourced fact — a Greek-bridge equation, a sign reading, a Pleiades ID, a benchmark item."
title: "[data] "
labels: ["data", "contribution"]
body:
  - type: markdown
    attributes:
      value: |
        Small, well-scoped, **sourced** facts are the best contributions — see the
        [contribution menu](https://github.com/ryanpavlicek/pyaegean/blob/main/CONTRIBUTING.md#good-first-contributions-a-menu).
        Each lands in a bundled JSON / lexicon with a citation and a test. (You are
        welcome to open a pull request directly instead of this issue.)
  - type: dropdown
    id: kind
    attributes:
      label: What kind of data?
      options:
        - "Linear B → Greek bridge equation (lexicon)"
        - "Sign value / variant / attribute (Linear A/B, Cypriot, Cypro-Minoan)"
        - "Gazetteer Pleiades ID for a find-site"
        - "Closed-class Greek form (article/particle/pronoun)"
        - "Benchmark gold item (lemma/POS)"
        - "Other (describe below)"
    validations:
      required: true
  - type: textarea
    id: payload
    attributes:
      label: The fact
      description: The entry exactly as it should be recorded (form, value, lemma, id, …).
      placeholder: "e.g. po-me = ποιμήν 'shepherd' (Linear B → Greek)"
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Source / authority
      description: The edition, lexicon, or database the fact comes from, with a reference.
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: "This is a single, verifiable fact (not a bulk import or a design change)."
          required: true
        - label: "It is openly licensed or a scholarly fact (not copied from an all-rights-reserved dataset)."
          required: true
