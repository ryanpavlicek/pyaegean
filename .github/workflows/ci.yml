name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default: every job here only reads the repo (checkout + lint/test/build),
# so contents:read is all that's needed. Publishing lives in release.yml, which escalates
# per-job where it needs id-token:write.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Type-check
        run: mypy
      - name: Public-API stability (baseline diff)
        run: python scripts/check_api.py
      - name: Tests
        run: pytest --cov=aegean --cov-report=term-missing

  # The [geo] extra (geopandas/shapely) is heavy, so it gets one dedicated cell instead of
  # widening the whole matrix; [parquet] rides along so the real pyarrow write path runs too.
  # Without this job every importorskip("geopandas")/importorskip("pyarrow") test skips on
  # every run; -rs surfaces whatever still skips.
  geo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev,geo,parquet]"
      - name: Tests (geo + parquet extras installed, skips reported)
        run: pytest -rs

  notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Register the python3 kernel
        run: python -m ipykernel install --user --name python3
      - name: Execute example notebooks
        run: pytest --nbmake notebooks/

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - name: Footprint guard (wheel is code + JSON only, no heavy binaries)
        run: python scripts/check_footprint.py --wheel "dist/*.whl"

  footprint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install .          # core only — no extras, so heavy deps stay absent
      - name: Import-clean + import-fast guard
        run: python scripts/check_footprint.py
