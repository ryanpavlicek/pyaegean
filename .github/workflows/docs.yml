name: Docs site

# Builds the API reference site from the package's docstrings + type hints with
# MkDocs (Material theme + mkdocstrings) and publishes it to GitHub Pages:
# https://ryanpavlicek.github.io/pyaegean/
#
# mkdocstrings imports the package to introspect it; `import aegean` pulls no heavy
# deps (the footprint guard enforces this), so a base install is enough. One-time
# prerequisite: Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight Pages deploy at a time; don't cancel a running deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[docs]"
      - name: Build API reference (mkdocs)
        run: mkdocs build --strict -d _site
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
